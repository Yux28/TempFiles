# ============================================================================
#          Mihomo (Clash Meta) 内核配置文件
#          —— 规则分流 + 机场订阅 · 完整配置 ——
#
#  代理组结构:
#    🚀 选择代理 (顶层) ──┬── ♻️ 自动选择  (url-test, 最低延迟)
#                        ├── 🎯 手动选择  (自选节点)
#                        ├── 🔄 自动回退  (fallback, 按可用性切换)
#                        └── ⚖️ 负载均衡  (流量分散)
#
#  规则分流策略:
#    广告 / 追踪 → 🛑 广告拦截 → REJECT
#    国内网站     → 🎯 全球直连 → DIRECT
#    国际网站     → 🚀 选择代理 → 代理
#    未命中       → 🐟 漏网之鱼 → 选择代理
#
#  使用前必须修改:
#    1. proxy-providers.airport.url → 你的机场订阅链接
#    2. external-controller 的 secret → 设置 API 密码 (可选)
# ============================================================================


# ============================================================================
#                              YAML 锚点
# ============================================================================
# 共用健康检查 — proxy-provider 和 proxy-group 都会引用
health-check: &health-check
  enable: true
  url: https://www.gstatic.com/generate_204
  interval: 300

# url-test / fallback 共用延迟测试参数（各策略组内联配置以保持最大兼容性）


# ============================================================================
#                              基础设置
# ============================================================================
mixed-port: 7890                # HTTP(S) + SOCKS5 混合端口
socks-port: 7891                # 额外独立 SOCKS5 端口
allow-lan: true                 # 局域网设备可连接本代理
bind-address: "*"               # 监听全部网络接口
mode: rule                      # rule=规则 / global=全局代理 / direct=全局直连
log-level: info                 # debug | info | warning | error | silent
ipv6: true                      # 开启 IPv6
unified-delay: true             # 统一延迟（更精准）
tcp-concurrent: true            # TCP 并发握手
find-process-mode: strict       # 进程匹配（用于 PROCESS-NAME 规则）

# ---- 外部控制 (Dashboard) ----
# 配合 Yacd / MetaCubeXD / Clash Verge 等 Web 面板使用
external-controller: 0.0.0.0:9090
secret: ""                      # <--- 建议设置 API 访问密码

# ---- 持久化 ----
profile:
  store-selected: true          # 记住手动选择的节点（重启后保留）
  store-fake-ip: true           # 持久化 fake-ip 映射


# ============================================================================
#                              TUN 模式
# ============================================================================
tun:
  enable: true
  stack: mixed                  # Linux → system | Windows/macOS → mixed / gvisor
  dns-hijack:
    - any:53                    # 劫持所有 UDP DNS 请求
    - tcp://any:53              # 劫持所有 TCP DNS 请求
  auto-route: true              # 自动配置系统路由表
  auto-detect-interface: true   # 自动检测出口网卡


# ============================================================================
#                             SNI 嗅探
# ============================================================================
sniffer:
  enable: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
  force-dns-mapping: true       # 强制 DNS 映射，防止 DNS 泄漏
  parse-pure-ip: true           # 解析纯 IP 请求的 SNI


# ============================================================================
#                              DNS 配置
# ============================================================================
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  prefer-h3: true               # HTTP/3 DNS（更快握手）

  # 解析 DoH / DoT 服务器域名时使用的上游 DNS
  default-nameserver:
    - 223.5.5.5                 # 阿里
    - 119.29.29.29              # 腾讯 DNSPod
    - 180.76.76.76              # 百度

  # ---- Fake-IP 模式 ----
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:               # 这些域名不走 fake-ip
    - "*.lan"
    - "*.local"
    - "localhost.ptlogin2.qq.com"
    - "+.stun.*.*"
    - "+.stun.*.*.*"
    - "+.stun.*.*.*.*"
    - "lens.l.google.com"
    - "*.n.n.srv.nintendo.net"

  # ---- 国内 DNS (直连域名解析) ----
  nameserver:
    - https://doh.pub/dns-query             # 腾讯 DNSPod DoH
    - https://dns.alidns.com/dns-query      # 阿里 DoH
    - 223.5.5.5                             # 阿里 UDP

  # ---- 国际 DNS (代理域名解析) ----
  fallback:
    - https://dns.google/dns-query          # Google DoH
    - https://cloudflare-dns.com/dns-query  # Cloudflare DoH
    - tls://8.8.8.8:853                     # Google DoT

  # ---- 哪些域名走 fallback ----
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
    ipcidr:
      - 240.0.0.0/4
    domain:
      - +.google.com
      - +.googleapis.com
      - +.youtube.com
      - +.facebook.com
      - +.twitter.com
      - +.instagram.com
      - +.telegram.org
      - +.github.com
      - +.cloudflare.com
      - +.openai.com

  # ---- 按域名指定 DNS 服务器 ----
  nameserver-policy:
    "geosite:cn":
      - https://doh.pub/dns-query
      - 223.5.5.5
    "geosite:geolocation-!cn":
      - https://dns.google/dns-query
      - https://cloudflare-dns.com/dns-query


# ============================================================================
#                         GeoIP / GeoSite 数据库
# ============================================================================
geodata-mode: true
geox-url:
  geoip: "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat"
  geosite: "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat"
  mmdb: "https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country.mmdb"


# ============================================================================
#                     Proxy Providers (机场订阅)
# ============================================================================
proxy-providers:
  airport:
    type: http
    url: "https://gh-proxy.com/https://raw.githubusercontent.com/peasoft/NoMoreWalls/master/list.meta.yml"                  # <--- 🔴 替换为你的机场订阅地址
    path: ./proxy-providers/airport.yaml     # 本地缓存路径
    interval: 86400                          # 每 24 小时更新一次
    health-check: *health-check              # 引用锚点：健康检查
    # ---- 可选：节点过滤 ----
    # filter: "香港|台湾|日本|新加坡|美国|HK|TW|JP|SG|US"
    # exclude-filter: "过期|到期|剩余流量|官网|倍率"
    # exclude-type: "ssr|http"              # 排除特定协议


# ============================================================================
#                         Proxy Groups (代理组)
# ============================================================================
#  策略类型说明:
#    url-test     → 自动测速，延迟最低的胜出
#    select       → 手动在面板中选择节点或策略组
#    fallback     → 按可用性自动切换（节点挂了就切下一个）
#    load-balance → 流量分散到多个节点（负载均衡）
#
#  嵌套关系一览:
#    🚀 选择代理 ── 包含子策略组，是规则匹配后的统一出口
#    ├── ♻️ 自动选择    → url-test, 机场节点
#    ├── 🎯 手动选择    → select,  机场节点 + DIRECT
#    ├── 🔄 自动回退    → fallback, 机场节点
#    └── ⚖️ 负载均衡    → load-balance, 机场节点
#
#    🐟 漏网之鱼    → MATCH 兜底，默认走 🚀 选择代理
#    🛑 广告拦截    → REJECT 广告域名
#    🎯 全球直连    → 国内站点直连

proxy-groups:

  # ======================== 一级：顶层入口组 ========================

  # 🚀 选择代理 — 嵌套所有子策略组，规则匹配后的统一入口
  - name: "🚀 选择代理"
    type: select
    proxies:
      - ♻️ 自动选择
      - 🎯 手动选择
      - 🔄 自动回退
      - ⚖️ 负载均衡
      - DIRECT

  # ======================== 二级：节点级策略组 ========================
  # 这四个组直接使用机场节点，负责具体的节点选择策略

  # ♻️ 自动选择 — url-test，自动切换到延迟最低的节点
  - name: "♻️ 自动选择"
    type: url-test
    use:
      - airport
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50               # 延迟差距 < 50ms 不切换，防止频繁抖动

  # 🎯 手动选择 — 从所有机场节点中手动挑一个
  - name: "🎯 手动选择"
    type: select
    use:
      - airport

  # 🔄 自动回退 — 节点不可用时自动切换
  - name: "🔄 自动回退"
    type: fallback
    use:
      - airport
    url: https://www.gstatic.com/generate_204
    interval: 300

  # ⚖️ 负载均衡 — 流量分散到多个节点
  - name: "⚖️ 负载均衡"
    type: load-balance
    use:
      - airport
    url: https://www.gstatic.com/generate_204
    interval: 300
    strategy: consistent-hashing   # consistent-hashing / round-robin

  # 🐟 漏网之鱼 — 未命中任何规则时的最终兜底
  - name: "🐟 漏网之鱼"
    type: select
    proxies:
      - 🚀 选择代理
      - DIRECT
      - REJECT

  # 🛑 广告拦截 — 广告 / 追踪域名 → REJECT
  - name: "🛑 广告拦截"
    type: select
    proxies:
      - REJECT
      - DIRECT
      - 🚀 选择代理

  # 🎯 全球直连 — 国内网站 / 不需要代理的服务
  - name: "🎯 全球直连"
    type: select
    proxies:
      - DIRECT
      - 🚀 选择代理

  # 🪟 微软服务 — Microsoft 365 / Copilot / Xbox / Windows Update 等
  - name: "🪟 微软服务"
    type: select
    proxies:
      - 🎯 全球直连
      - 🚀 选择代理

  # 🍎 Apple 服务 — App Store / iCloud / Apple Music 等
  - name: "🍎 Apple服务"
    type: select
    proxies:
      - 🎯 全球直连
      - 🚀 选择代理

  # ✈️ Telegram
  - name: "✈️ Telegram"
    type: select
    proxies:
      - 🚀 选择代理
      - 🎯 全球直连

  # 🎬 流媒体 — Netflix / YouTube / Disney+ / Spotify 等
  - name: "🎬 流媒体"
    type: select
    proxies:
      - 🚀 选择代理
      - 🎯 全球直连


# ============================================================================
#                      Rule Providers (远程规则集)
# ============================================================================
#  来源: Loyalsoldier/clash-rules (GitHub, 每日自动更新)
#  behavior: domain → 纯域名列表 | ipcidr → IP CIDR 列表 | classical → Clash 经典规则
rule-providers:

  # ---- 广告 / 隐私 / 追踪 ----
  reject:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    path: ./ruleset/reject.yaml
    interval: 86400                     # 每 24 小时更新

  # ---- 局域网 / 私有网络 ----
  private:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt"
    path: ./ruleset/private.yaml
    interval: 86400

  lancidr:
    type: http
    behavior: ipcidr
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt"
    path: ./ruleset/lancidr.yaml
    interval: 86400

  # ---- Apple ----
  apple:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/apple.txt"
    path: ./ruleset/apple.yaml
    interval: 86400

  icloud:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/icloud.txt"
    path: ./ruleset/icloud.yaml
    interval: 86400

  # ---- Google ----
  google:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/google.txt"
    path: ./ruleset/google.yaml
    interval: 86400

  # ---- Microsoft (来自 ACL4SSR) ----
  microsoft:
    type: http
    behavior: classical
    url: "https://cdn.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/Providers/Ruleset/Microsoft.yaml"
    path: ./ruleset/microsoft.yaml
    interval: 86400

  # ---- GFW ----
  gfw:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt"
    path: ./ruleset/gfw.yaml
    interval: 86400

  # ---- 非中国 TLD ----
  tld-not-cn:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/tld-not-cn.txt"
    path: ./ruleset/tld-not-cn.yaml
    interval: 86400

  # ---- 代理列表 ----
  proxy:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt"
    path: ./ruleset/proxy.yaml
    interval: 86400

  # ---- 直连列表 ----
  direct:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt"
    path: ./ruleset/direct.yaml
    interval: 86400

  # ---- Telegram CIDR ----
  telegramcidr:
    type: http
    behavior: ipcidr
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/telegramcidr.txt"
    path: ./ruleset/telegramcidr.yaml
    interval: 86400

  # ---- 中国 IP ----
  cncidr:
    type: http
    behavior: ipcidr
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt"
    path: ./ruleset/cncidr.yaml
    interval: 86400

  # ---- 应用进程 ----
  applications:
    type: http
    behavior: classical
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/applications.txt"
    path: ./ruleset/applications.yaml
    interval: 86400


# ============================================================================
#                            Rules (规则)
# ============================================================================
# 匹配顺序: 从上到下，命中即停止
# 格式: RULE-SET,<规则集名称>,<代理组>
#        DOMAIN-SUFFIX,<域名>,<代理组>
#        GEOIP,<国家代码>,<代理组>
#        MATCH,<兜底代理组>

rules:

  # ---- 广告 / 追踪 (最高优先级) ----
  - RULE-SET,reject,🛑 广告拦截
  - RULE-SET,applications,🎯 全球直连

  # ---- 局域网 / 私有网络 (直连) ----
  - RULE-SET,private,🎯 全球直连
  - RULE-SET,lancidr,🎯 全球直连

  # ---- 中国 IP 段 (直连) ----
  - RULE-SET,cncidr,🎯 全球直连

  # ---- Apple / iCloud ----
  - RULE-SET,apple,🍎 Apple服务
  - RULE-SET,icloud,🍎 Apple服务

  # ---- Google / Microsoft ----
  - RULE-SET,google,🚀 选择代理
  - RULE-SET,microsoft,🪟 微软服务

  # ---- Telegram ----
  - RULE-SET,telegramcidr,✈️ Telegram

  # ---- GFW / 代理列表 ----
  - RULE-SET,gfw,🚀 选择代理
  - RULE-SET,proxy,🚀 选择代理
  - RULE-SET,tld-not-cn,🚀 选择代理

  # ---- 已知国内直连 ----
  - RULE-SET,direct,🎯 全球直连

  # ---- 常用国内域名补充 ----
  - DOMAIN-SUFFIX,cn,🎯 全球直连
  - DOMAIN-KEYWORD,baidu,🎯 全球直连
  - DOMAIN-KEYWORD,alipay,🎯 全球直连
  - DOMAIN-KEYWORD,taobao,🎯 全球直连
  - DOMAIN-KEYWORD,jd,🎯 全球直连
  - DOMAIN-KEYWORD,qq,🎯 全球直连
  - DOMAIN-KEYWORD,weixin,🎯 全球直连
  - DOMAIN-KEYWORD,bilibili,🎯 全球直连
  - DOMAIN-KEYWORD,douyin,🎯 全球直连

  # ---- 最终兜底 ----
  # GEOIP: 中国 IP → 直连，其他 → 漏网之鱼
  - GEOIP,CN,🎯 全球直连
  - MATCH,🐟 漏网之鱼
