rule-providers:
  my_direct:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/peasoft/NoMoreWalls/master/list.meta.yml
    interval: 86400

rules:
  - DOMAIN-SUFFIX,cloudfront.net,DIRECT
  - DOMAIN-SUFFIX,ttvnw.net,DIRECT
  - DOMAIN-SUFFIX,surrit.com,DIRECT
  - DOMAIN-SUFFIX,mushroomtrack.com,DIRECT
  - DOMAIN-KEYWORD,wowstream,DIRECT
  - RULE-SET,my_direct,DIRECT
